<div class="main-layout-root">
  <div class="screen">
    <div class="top-actions">
      <div class="action-card">
        <span class="material-icons">mic</span>
        <small>ASSISTENTE VOCALE</small>
      </div>
    </div>

    <div class="tabs">
      <button routerLink="/home" routerLinkActive="active">
        <span class="material-icons">menu_book</span> Home
      </button>
      <button routerLink="/calendar" routerLinkActive="active">
        <span class="material-icons">calendar_today</span> Calendario
      </button>
    </div>

    <ng-content></ng-content>

    <br>

    <div class="action-card big-button" (click)="showFarmacoCheck = true">
      <span class="material-icons">medication</span>
      <span>FARMACO CHECK</span>
    </div>

    <div class="bottom-nav">
      <div (click)="goHome()" [class.active]="isRoute('/home') && !showContatti && !showOpzioni">
        <span class="material-icons">home</span><small>Home</small>
      </div>
      <div (click)="openContattiModal()" [class.active]="showContatti">
        <span class="material-icons">contacts</span><small>Contatti</small>
      </div>
      <div (click)="openOpzioniModal()" [class.active]="showOpzioni">
        <span class="material-icons">settings</span><small>Opzioni</small>
      </div>
    </div>
  </div>

  <app-farmaco-check
    *ngIf="showFarmacoCheck"
    (scanned)="onScanned()"
    (closed)="showFarmacoCheck = false">
  </app-farmaco-check>

  <div class="result-card-overlay" *ngIf="showResultCard">
    <div class="result-card">
      <button class="close-btn" (click)="closeResultCard()">✕</button>
      <div class="result-card-header">
        <span class="material-icons">check_circle</span>
        <h3>Farmaco Riconosciuto</h3>
      </div>
      <div class="result-card-body">
        <div class="result-row">
          <span class="result-label">Nome:</span>
          <span class="result-value">Imodium 2mg</span>
        </div>
        <div class="result-row">
          <span class="result-label">Principio attivo:</span>
          <span class="result-value">Loperamide cloridrato</span>
        </div>
        <div class="result-row">
          <span class="result-label">Dosaggio:</span>
          <span class="result-value">2mg/capsula</span>
        </div>
        <div class="result-row">
          <span class="result-label">Scadenza:</span>
          <span class="result-value">03/2027</span>
        </div>
        <div class="result-row">
          <span class="result-label">Produttore:</span>
          <span class="result-value">Johnson & Johnson</span>
        </div>
      </div>
      <button class="close-card-btn" (click)="closeResultCard()">Chiudi</button>
    </div>
  </div>

  <app-contatti *ngIf="showContatti" (closed)="showContatti = false"></app-contatti>

  <app-opzioni-paziente *ngIf="showOpzioni" (closed)="showOpzioni = false"></app-opzioni-paziente>
</div>
