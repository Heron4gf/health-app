<app-main-layout [showTopSection]="false" [navItems]="navItems">
  <h2 class="title">Opzioni</h2>
  <div class="content">
    <div class="sections">
      <div class="section">
        <div class="section-label">Profilo</div>
        <div class="option-row">
          <span class="option-label">Nome</span>
          <span class="option-value">Mario Rossi</span>
        </div>
        <div class="option-row">
          <span class="option-label">Data di nascita</span>
          <span class="option-value">12/03/1958</span>
        </div>
        <div class="option-row">
          <span class="option-label">Medico di base</span>
          <span class="option-value">Dr.ssa Marino</span>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Notifiche</div>
        <div class="option-row">
          <span class="option-label">Promemoria farmaci</span>
          <label class="toggle-switch">
            <input type="checkbox" checked disabled>
            <span class="slider"></span>
          </label>
        </div>
        <div class="option-row">
          <span class="option-label">Avvisi aderenza</span>
          <label class="toggle-switch">
            <input type="checkbox" checked disabled>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Terapia</div>
        <div class="option-row">
          <span class="option-label">Farmaci attivi</span>
          <span class="option-value">2</span>
        </div>
        <div class="option-row">
          <span class="option-label">Prossima visita</span>
          <span class="option-value">15/04/2026</span>
        </div>
      </div>

      <div class="section">
        <div class="section-label">App</div>
        <div class="option-row">
          <span class="option-label">Versione</span>
          <span class="option-value">1.0.0</span>
        </div>
        <div class="option-row logout-row" (click)="logout()">
          <span class="option-label logout-text">Logout</span>
          <span class="material-icons logout-icon">exit_to_app</span>
        </div>
      </div>
    </div>
  </div>
</app-main-layout>
